# Modified to follow linear build pattern from PH Core IG

name: Build PH eReferral FHIR IG

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch name
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          echo "Checking branch name: $BRANCH_NAME"

          # Check for forward slash
          if echo "$BRANCH_NAME" | grep -q '/'; then
            echo "::error::Branch name contains '/'. Use hyphens instead."
            exit 1
          fi

          # Check for other invalid characters
          if echo "$BRANCH_NAME" | grep -qE '[\\~^:\[\] ]'; then
            echo "::error::Branch name contains invalid special characters."
            exit 1
          fi

          echo "✅ Branch name validation passed"

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          sudo gem install jekyll
          sudo npm install -g fsh-sushi

      - name: Build IG
        run: |
          chmod +x ./_updatePublisher.sh
          ./_updatePublisher.sh -y
          chmod +x ./_genonce.sh
          ./_genonce.sh

      - name: QA Gate
        run: |
          if [ -f output/qa.json ]; then
            ERRORS=$(jq -r '.errs // 0' output/qa.json)
            # Allow up to 5 errors (known validation issues with PH Core 0.2.0)
            if [ "$ERRORS" -gt 5 ]; then
              echo "::error::Too many QA errors found: $ERRORS (max allowed: 5)"
              exit 1
            fi
            echo "✅ QA passed: $ERRORS errors (max allowed: 5)"
          else
            echo "::warning::No qa.json found"
          fi

      - name: Deploy to GitHub Pages
        if: always() && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./output
          single_commit: true
          commit_message: "Deploy IG - ${{ github.sha }}"
